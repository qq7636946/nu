<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BORN&BRED - Video Mask Effect</title>

  <!-- 引入字體：Archivo Black 用於巨型標題，Inter 用於介面文字 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@600;700;800&display=swap"
    rel="stylesheet">

  <!-- 引入 GSAP 動畫庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root {
      --bg-white: #ffffff;
      --text-black: #000000;
      --accent-red: #FF1A1A;
      --card-black: #050505;
      --logo-green: #00FF66;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-white);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------------- Header 導覽列 ---------------- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5vw 2vw;
      background-color: var(--bg-white);
      position: relative;
      z-index: 10;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
    }

    /* 模擬左上角紅色 B 標誌 */
    .header-logo svg {
      fill: var(--accent-red);
      width: 100%;
      height: auto;
    }

    .header-center {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--text-black);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .btn-red {
      background-color: var(--accent-red);
      color: var(--bg-white);
      border: none;
    }

    .btn-menu {
      background-color: transparent;
      color: var(--text-black);
      border: 1px solid #E0E0E0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ---------------- 核心視覺區塊 (影片遮罩) ---------------- */
    .hero-section {
      position: relative;
      width: 100%;
      background-color: var(--bg-white);
      padding-bottom: 2vw;
    }

    /* 背景影片：在最底層播放 */
    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    /* 魔法就在這裡！
           利用 mix-blend-mode: screen 
           當背景為白 (White) 時，會覆蓋影片。
           當文字為黑 (Black) 時，會透出底下的影片。
        */
    .text-mask-container {
      position: relative;
      z-index: 1;
      /* 覆蓋在影片上方 */
      background-color: var(--bg-white);
      color: var(--text-black);
      mix-blend-mode: screen;

      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1vw 0 3vw 0;
      overflow: hidden;
    }

    .giant-text {
      font-family: 'Archivo Black', sans-serif;
      font-size: 21.5vw;
      /* 根據畫面寬度自適應的超大字體 */
      line-height: 0.75;
      letter-spacing: -0.06em;
      /* 緊密的字距，還原原圖風格 */
      white-space: nowrap;
      user-select: none;
    }

    /* ---------------- 下方黑色卡片 ---------------- */
    .bottom-card-wrapper {
      position: relative;
      z-index: 2;
      /* 正常圖層，會完全蓋住影片 */
      padding: 0 1vw;
      /* 兩側留白邊界 */
    }

    .bottom-card {
      background-color: var(--card-black);
      width: 100%;
      height: 48vw;
      /* 大面積區塊 */
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* 中間霓虹綠色像素 Logo */
    .card-logo {
      width: 25vw;
      max-width: 300px;
      height: auto;
    }

    .card-logo path {
      fill: var(--logo-green);
    }

    /* RWD 響應式微調 */
    @media (max-width: 768px) {
      .header-center {
        display: none;
        /* 手機版隱藏中間文字 */
      }

      .giant-text {
        font-size: 22vw;
      }

      .bottom-card {
        height: 60vh;
      }
    }
  </style>
</head>

<body>

  <!-- 頂部導覽列 -->
  <header class="header js-header">
    <div class="header-logo">
      <!-- 模擬標誌 -->
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,10 Q50,0 80,30 Q90,50 60,80 Q30,90 20,50 Z" />
        <path d="M25,20 L50,50 L30,70 Z" fill="#fff" />
      </svg>
    </div>
    <div class="header-center">
      2X Adweek's Fastest Growing Agency
    </div>
    <div class="header-right">
      <button class="btn btn-red">Work With Us</button>
      <button class="btn btn-menu"><span>≡</span> Menu</button>
    </div>
  </header>

  <!-- 視覺區塊 -->
  <section class="hero-section">

    <!-- 背景影片 (使用高畫質抽象流動影片做示範) -->
    <video class="bg-video" autoplay loop muted playsinline>
      <source src="images/home.mp4" type="video/mp4">
    </video>

    <!-- 文字遮罩層 (透出影片) -->
    <div class="text-mask-container">
      <h1 class="giant-text js-text">BORN&BRED</h1>
    </div>



  </section>

  <!-- GSAP 進場動畫腳本 -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

      // 1. 導覽列淡入下降
      tl.from(".js-header", {
        y: -20,
        opacity: 0,
        duration: 1
      })

        // 2. 巨型文字遮罩放大浮現
        .from(".js-text", {
          scale: 0.85,
          opacity: 0,
          duration: 1.2,
          ease: "back.out(1.5)"
        }, "-=0.6")

        // 3. 底部黑色卡片向上滑入
        .from(".js-card", {
          y: 100,
          opacity: 0,
          duration: 1
        }, "-=0.8")

        // 4. 卡片中央 Logo 彈現
        .from(".js-logo", {
          scale: 0,
          rotation: -45,
          opacity: 0,
          duration: 1,
          ease: "elastic.out(1, 0.5)"
        }, "-=0.4");
    });
  </script>
</body>

</html>
